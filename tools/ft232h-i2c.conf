# ftdi_eeprom --flash-eeprom tools/ft232h-i2c.conf
# Example of optimal settings for i2c ft232h
# that leads to an automatic probing of the kernel ftdi driver.
vendor_id=0x0403
product_id=0x6014
manufacturer="Acme demo"
product="FT232H adafruit I2C"
use_serial=true
serial="ACME-0001" # XXX should be unique, TODO extend ftdi_eeprom to generated a uuid
self_powered=false
remote_wakeup=false
max_power=500

# Be aware that for FT232H: group0=ACBUS, group1=ADBUS (data bus for I2C)
group1_drive=8MA
group1_schmitt=true
group1_slew=slow
